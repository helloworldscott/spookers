<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lighthouse: Nights of Fog</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="panel">
      <div id="nightLabel">Night 1</div>
      <div id="fuelLabel">Fuel: 0%</div>
      <div id="powerLabel">Power: 0%</div>
      <div id="objectiveLabel">Objective: ...</div>
    </div>
    <div id="prompt"></div>
  </div>

  <div id="crosshair"></div>

  <div id="startOverlay" class="overlay visible">
    <h1>Lighthouse: Nights of Fog</h1>
    <p>Creatures move in darkness. Keep the beam alive.</p>
    <button id="startBtn">Click to Start</button>
  </div>

  <div id="dawnOverlay" class="overlay">
    <h2 id="dawnTitle">Dawn</h2>
    <p id="dawnText"></p>
    <button id="nextNightBtn">Begin Next Night</button>
  </div>

  <div id="endOverlay" class="overlay">
    <h2 id="endTitle">Ending</h2>
    <p id="endText"></p>
    <button id="restartBtn">Restart</button>
  </div>

  <div id="choiceOverlay" class="overlay small">
    <h3>Final Choice</h3>
    <p>What will you do when dawn is near?</p>
    <div class="row">
      <button id="choiceEscape">Call for Escape</button>
      <button id="choiceKeeper">Remain as Keeper</button>
      <button id="choiceDestroy">Destroy Lighthouse</button>
    </div>
  </div>

  <div id="lensOverlay" class="overlay small">
    <h3>Lens Alignment</h3>
    <p>Set all knobs to target 2.</p>
    <p id="lensStatus"></p>
    <div class="row">
      <button id="lensK1">Knob A</button>
      <button id="lensK2">Knob B</button>
      <button id="lensK3">Knob C</button>
      <button id="lensClose">Close</button>
    </div>
  </div>

  <div id="logbook" class="overlay small">
    <h3>Logbook</h3>
    <p id="logCount">Pages: 0/5</p>
    <div id="logList"></div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
